# 日本政府「日本成長戦略本部」17戦略分野（2025-11-04発足）
#
# 用途: 株式スクリーニングの第一層「産業ベータ」。買いリストではない。
# policy_theme_score は最終BUY判定には使わず、産業の追い風加点として
# 技術スコア(0-100)とは別カラムで並走させる。
#
# scoring:
#   base_score:  A=10, B=6, C=3
#   rank_bonus:  A=+5, B=+2, C=+0
#   keyword_hit: 1ヒットごと+1 (最大+5)
#   合計上限: 20点
#
# keywords: 銘柄の industry / themes / name に対する部分一致。
#   英語(moomoo plate名)と日本語の両方を含める。

scoring:
  base_score: {A: 10, B: 6, C: 3}
  rank_bonus: {A: 5, B: 2, C: 0}
  keyword_hit_bonus_per_hit: 1
  keyword_hit_bonus_max: 5
  total_cap: 20

